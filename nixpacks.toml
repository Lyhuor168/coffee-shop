[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.tokenizer", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.openssl"]

[phases.install]
cmds = ["curl -sS https://getcomposer.org/installer | php84 && mv composer.phar /usr/local/bin/composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
