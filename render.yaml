services:
  - type: web
    name: coffee-shop
    runtime: php
    buildCommand: composer install --no-dev && php artisan optimize
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
